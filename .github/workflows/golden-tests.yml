name: Golden snapshot tests — renderer output across React, Vue, Lit

on:
  push:
    branches: [master]
    paths:
      - 'v2/schema/**'
      - 'v2/demo/src/fixtures/**'
      - 'v2/renderers/**'
  pull_request:
    paths:
      - 'v2/schema/**'
      - 'v2/demo/src/fixtures/**'
      - 'v2/renderers/**'

jobs:
  golden-tests:
    name: Renderer golden snapshots
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            v2/schema/package-lock.json
            v2/renderers/react/package-lock.json
            v2/renderers/vue/package-lock.json
            v2/renderers/lit/package-lock.json

      - name: Build schema
        run: npm ci && npm run build
        working-directory: v2/schema

      - name: Install React renderer deps
        run: npm ci
        working-directory: v2/renderers/react

      - name: Install Vue renderer deps
        run: npm ci
        working-directory: v2/renderers/vue

      - name: Install Lit renderer deps
        run: npm ci
        working-directory: v2/renderers/lit

      - name: Run React golden tests
        run: npm test
        working-directory: v2/renderers/react

      - name: Run Vue golden tests
        run: npm test
        working-directory: v2/renderers/vue

      - name: Run Lit golden tests
        run: npm test
        working-directory: v2/renderers/lit
