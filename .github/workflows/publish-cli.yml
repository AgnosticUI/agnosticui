name: Publish CLI to NPM

on:
  push:
    tags:
      - 'v2.*'

permissions:
  id-token: write  # Required for OIDC trusted publishing
  contents: read

jobs:
  publish:
    name: Build, test, and publish agnosticui-cli
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Validate tag matches package.json version
        working-directory: v2/cli
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "❌ Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi
          echo "✅ Version validated: $PKG_VERSION"

      - name: Install dependencies
        run: npm ci
        working-directory: v2/cli

      - name: Build
        run: npm run build
        working-directory: v2/cli

      - name: Test
        run: npm test
        working-directory: v2/cli

      - name: Determine dist-tag
        id: dist-tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$TAG_VERSION" == *"-"* ]]; then
            echo "tag=alpha" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to NPM
        run: npm publish --provenance --tag ${{ steps.dist-tag.outputs.tag }}
        working-directory: v2/cli

      - name: Point latest dist-tag to this release
        if: steps.dist-tag.outputs.tag == 'alpha'
        working-directory: v2/cli
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          npm dist-tag add agnosticui-cli@${PKG_VERSION} latest
